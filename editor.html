  header{position:sticky;top:0;background:#0c1018ee;backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:.8rem 1rem;z-index:10}

  .hint{font-size:.72rem;color:var(--dim);line-height:1.6}
  .content{padding:.5rem .8rem}
  .sec{font-size:.82rem;font-weight:800;color:var(--gold);padding:.9rem .2rem .4rem;border-bottom:1px solid var(--border);margin-bottom:.5rem;margin-top:.6rem}
  .date-sep{font-size:.72rem;color:var(--dim);padding:.5rem .2rem .2rem}
  .mcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.6rem .7rem;margin-bottom:.5rem}
  .mcard.set{border-color:var(--green)}
  .mtop{display:flex;justify-content:space-between;align-items:center;font-size:.68rem;color:var(--dim);margin-bottom:.4rem}
  .mteams{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-bottom:.5rem;font-size:.9rem;font-weight:700}
  .srow{display:flex;align-items:center;justify-content:center;gap:.3rem}
  .sbtn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:1.1rem;cursor:pointer;line-height:1}
  .sval{min-width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--card2);border-radius:7px;font-weight:800;font-size:1.1rem}
  .sval.q{color:var(--dim)}
  .colon{color:var(--dim);margin:0 .15rem}
  .clr{margin-right:.5rem;background:none;border:none;color:var(--red);font-size:.72rem;cursor:pointer}
  .toggle{background:var(--gold);color:#1a1300;border:none;border-radius:7px;padding:.3rem .7rem;font-size:.72rem;font-weight:800;cursor:pointer}
  .toggle.on{background:var(--green);color:#fff}
  footer{position:fixed;bottom:0;left:0;right:0;background:#0c1018f5;border-top:1px solid var(--border);padding:.7rem .9rem;display:flex;gap:.5rem}
  .fbtn{flex:1;border:none;border-radius:10px;padding:.8rem;font-size:.85rem;font-weight:800;cursor:pointer}
  .fbtn.primary{background:var(--gold);color:#1a1300}
  .fbtn.sec{background:var(--card2);color:var(--text);border:1px solid var(--border)}
  textarea{width:100%;height:120px;background:#06090f;color:#9fe0b0;border:1px solid var(--border);border-radius:10px;padding:.6rem;font-family:monospace;font-size:.75rem;margin-top:.6rem;display:none}
  .toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:.6rem 1.2rem;border-radius:20px;font-size:.8rem;opacity:0;transition:.3s;pointer-events:none;z-index:20}
  .toast.show{opacity:1}
</style>

function addSec(c,t){const e=document.createElement('div');e.className='sec';e.textContent=t;c.appendChild(e);}
function addDate(c,t){const e=document.createElement('div');e.className='date-sep';e.textContent='📅 '+t;c.appendChild(e);}

function card(m,n1,n2,f1,f2,tag){
  const set = scores[m.id]!==undefined;
  const s1 = set?scores[m.id][0]:null, s2=set?scores[m.id][1]:null;
  const d=document.createElement('div'); d.className='mcard'+(set?' set':''); d.id='c-'+m.id;
  d.innerHTML =
    '<div class="mtop"><span>'+m.time+' · '+tag+' · #'+m.id+'</span>'+
    '<span>'+(set?'<button class="clr" onclick="clr('+m.id+')">پاک کردن</button>':'')+
    '<button class="toggle'+(set?' on':'')+'" onclick="tog('+m.id+')">'+(set?'✓ ثبت شد':'＋ ثبت')+'</button></span></div>'+
    '<div class="mteams"><span>'+f1+' '+n1+'</span><span style="color:var(--dim)">در برابر</span><span>'+n2+' '+f2+'</span></div>'+
    (set?(
    '<div class="srow">'+
      '<button class="sbtn" onclick="adj('+m.id+',0,-1)">−</button>'+
      '<div class="sval" id="v1-'+m.id+'">'+s1+'</div>'+
      '<button class="sbtn" onclick="adj('+m.id+',0,1)">＋</button>'+
      '<span class="colon">:</span>'+
      '<button class="sbtn" onclick="adj('+m.id+',1,-1)">−</button>'+
      '<div class="sval" id="v2-'+m.id+'">'+s2+'</div>'+
      '<button class="sbtn" onclick="adj('+m.id+',1,1)">＋</button>'+
    '</div>'):'');
  return d;
}
function tog(id){ if(scores[id]!==undefined) delete scores[id]; else scores[id]=[0,0]; refresh(id); }
function clr(id){ delete scores[id]; refresh(id); }
function adj(id,idx,delta){ if(!scores[id])scores[id]=[0,0]; let v=scores[id][idx]+delta; if(v<0)v=0; if(v>20)v=20; scores[id][idx]=v; document.getElementById('v'+(idx+1)+'-'+id).textContent=v; }
function refresh(id){
  const all=[...MATCHES,...KO]; const m=all.find(x=>x.id===id);
  let n1,n2,f1,f2,tag;
  if(koIds.has(id)){ n1=m.s1;n2=m.s2;f1='🏁';f2='🏁';tag=FA_ROUNDS[m.round]||m.round; }
  else { n1=FA_TEAMS[m.t1]||m.t1;n2=FA_TEAMS[m.t2]||m.t2;f1=FLAGS[m.t1]||'🏳';f2=FLAGS[m.t2]||'🏳';tag='گروه '+m.grp; }
  document.getElementById('c-'+id).replaceWith(card(m,n1,n2,f1,f2,tag));
}
function genJSON(){
  const ordered={};
  [...MATCHES,...KO].forEach(m=>{ if(scores[m.id]!==undefined) ordered[m.id]=scores[m.id]; });
  const json=JSON.stringify({updated:new Date().toISOString(),scores:ordered},null,2);
  const ta=document.getElementById('out'); ta.style.display='block'; ta.value=json;
  ta.scrollIntoView({behavior:'smooth',block:'center'});
  toast(Object.keys(ordered).length+' نتیجه در JSON قرار گرفت');
}
function copyJSON(){
  const ta=document.getElementById('out');
  if(!ta.value){ genJSON(); }
  ta.style.display='block';
  navigator.clipboard?.writeText(ta.value).then(()=>toast('کپی شد!'),()=>{ta.select();document.execCommand('copy');toast('کپی شد!');});
}
async function loadExisting(){
  try{
    const r=await fetch(EXISTING_URL+'?t='+Date.now(),{cache:'no-store'});
    if(!r.ok) throw 0;
    const d=await r.json();
    if(d&&d.scores){ Object.entries(d.scores).forEach(([k,v])=>{ if(Array.isArray(v)&&v.length>=2) scores[+k]=[+v[0],+v[1]]; }); render(); toast('نتایج قبلی بارگذاری شد'); }
    else toast('فایل خالی بود');
  }catch(e){ toast('بارگذاری ناموفق (آدرس را بررسی کنید)'); }
}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);}
render();
</script>
</body></html>
